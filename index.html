<!-- 初回描画前にテーマを確定（チラつき防止） -->
<script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      var theme = (saved === 'light' || saved === 'dark')
        ? saved
        : (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
    } catch (e) {}
  })();
</script>
<style>
  /* ========= テーマ変数 ========= */
  :root {
    /* ダークテーマ（既定） */
    --bg-app: #1e1e22;
    --bg-toolbar: var(--bg-toolbar);
    --bg-sidebar: var(--bg-sidebar);
    --bg-canvas-area: var(--bg-canvas-area);
    --bg-elevated: var(--bg-elevated);
    --bg-button: var(--bg-button);
    --bg-button-hover: var(--bg-button-hover);
    --bg-sidebar-dragover: var(--bg-sidebar-dragover);
    --bg-danger: var(--bg-danger);
    --bg-danger-hover: var(--bg-danger-hover);
    --bg-modal: var(--bg-toolbar);
    --bg-orient-group: var(--bg-toolbar);
    --bg-empty-panel: #fff;

    --text-primary: var(--text-primary);
    --text-secondary: #888;
    --text-muted: #aaa;
    --text-faint: #666;
    --text-empty-headline: #555;
    --text-empty-arrow: #bbb;
    --text-empty-caption: #555;

    --border: var(--border);
    --border-panel: #d8d8d8;
    --shadow-panel: rgba(0,0,0,0.04);
    --shadow-canvas: rgba(0,0,0,0.5);

    /* ブランド・アクセント（テーマ非依存） */
    --accent-brand: #3FB8A6;
    --accent-brand-hover: #4DCEBA;
    --accent-highlight: #4a7cfa;
    --accent-highlight-hover: #5a8cff;

    /* 印刷紙関連（両テーマ共通：印刷見え方を維持） */
    --paper: #fff;
    --paper-margin: #b8b8b8;

    color-scheme: dark;
  }
  [data-theme="light"] {
    --bg-app: #f5f5f7;
    --bg-toolbar: #ffffff;
    --bg-sidebar: #fafafa;
    --bg-canvas-area: #eaeaee;
    --bg-elevated: #ffffff;
    --bg-button: #e5e5ea;
    --bg-button-hover: #d5d5da;
    --bg-sidebar-dragover: #dde6f5;
    --bg-danger: #ffd4d4;
    --bg-danger-hover: #ffbcbc;
    --bg-modal: #ffffff;
    --bg-orient-group: #ebebee;
    --bg-empty-panel: #fff;

    --text-primary: #1c1c1e;
    --text-secondary: #6e6e73;
    --text-muted: #5e5e63;
    --text-faint: #8a8a8e;
    --text-empty-headline: #444;
    --text-empty-arrow: #aaa;
    --text-empty-caption: #555;

    --border: #d1d1d6;
    --border-panel: #d8d8d8;
    --shadow-panel: rgba(0,0,0,0.06);
    --shadow-canvas: rgba(0,0,0,0.12);

    color-scheme: light;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: var(--bg-app); color: var(--text-primary); overflow: hidden; }

  #app { display: grid; grid-template-columns: 1fr 240px; grid-template-rows: 48px 1fr; height: 100vh; }

  #toolbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
  }
  #toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 12px; }
  #toolbar button, #toolbar label.btn {
    background: var(--bg-button); color: var(--text-primary); border: none; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  #toolbar button:hover, #toolbar label.btn:hover { background: var(--bg-button-hover); }
  #toolbar button.primary { background: #3FB8A6; }
  #toolbar button.primary:hover { background: #4DCEBA; }
  #toolbar button.active { background: #4a7cfa; }
  #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #toolbar .spacer { flex: 1; }
  #toolbar .info { font-size: 12px; color: var(--text-secondary); }

  /* アイコンボタン共通 */
  #toolbar .icon-btn {
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 34px;
    height: 32px;
  }
  #toolbar .icon-btn svg {
    width: 18px; height: 18px;
    display: block;
  }
  #toolbar button.primary.icon-btn {
    min-width: 44px;
    height: 34px;
  }
  #toolbar button.primary.icon-btn svg {
    width: 20px; height: 20px;
  }

  /* テーマ切替: 現テーマと反対のアイコンを表示（クリック後の状態を予告） */
  #theme-toggle .icon-sun { display: block; }
  #theme-toggle .icon-moon { display: none; }
  [data-theme="light"] #theme-toggle .icon-sun { display: none; }
  [data-theme="light"] #theme-toggle .icon-moon { display: block; }

  /* 縦/横トグル */
  #orientation-group {
    display: inline-flex;
    background: var(--bg-toolbar);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
  }
  #orientation-group button {
    background: transparent;
    color: var(--text-secondary);
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 28px;
  }
  #orientation-group button:hover { color: var(--text-primary); }
  #orientation-group button.active { background: #4a7cfa; color: #fff; }
  #orientation-group button.active:hover { background: #5a8cff; }
  #orientation-group button svg { width: 16px; height: 16px; }

  #canvas-area {
    background: var(--bg-canvas-area);
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #canvas-wrap {
    position: relative;
    background: var(--paper-margin);
    box-shadow: 0 8px 32px var(--shadow-canvas);
    flex-shrink: 0;
  }
  #canvas-wrap.dragover { outline: 3px dashed #4a7cfa; outline-offset: 4px; }
  #print-area {
    position: absolute;
    background: #fff;
    pointer-events: none;
  }
  #canvas-empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
    z-index: 6;
    gap: 22px;
    padding: 20px;
  }
  #canvas-empty-state.hidden { display: none; }
  #canvas-empty-state .empty-headline {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-empty-headline);
    letter-spacing: 0.5px;
  }
  #canvas-empty-state .empty-panels {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    justify-content: center;
    max-width: 100%;
  }
  #canvas-empty-state .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  #canvas-empty-state .panel-art {
    width: 84px;
    height: 84px;
    background: #fff;
    border: 1px solid var(--border-panel);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px var(--shadow-panel);
  }
  #canvas-empty-state .panel-art svg {
    width: 56px; height: 56px;
  }
  #canvas-empty-state .panel-caption {
    font-size: 12px;
    color: var(--text-empty-headline);
    text-align: center;
    line-height: 1.4;
    max-width: 100px;
  }
  #canvas-empty-state .panel-caption .step-num {
    display: inline-block;
    width: 18px; height: 18px;
    line-height: 18px; text-align: center;
    background: #3FB8A6; color: #fff;
    border-radius: 50%;
    font-size: 11px; font-weight: 700;
    margin-right: 4px;
    vertical-align: 1px;
  }
  #canvas-empty-state .empty-arrow {
    color: var(--text-empty-arrow); font-weight: 700; font-size: 18px;
    flex: 0 0 auto;
  }
  /* モバイル: 縦積み */
  @media (max-width: 720px) {
    #canvas-empty-state .empty-panels {
      flex-direction: column;
      gap: 4px;
    }
    #canvas-empty-state .empty-arrow {
      transform: rotate(90deg);
    }
  }
  #print-area::after {
    content: '';
    position: absolute; inset: 0;
    border: 1px dashed rgba(74,124,250,0.5);
    pointer-events: none;
  }
  .margin-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    font-weight: 600;
    color: rgba(0,0,0,0.7);
    letter-spacing: 0.5px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    line-height: 1;
  }
  .margin-label-top    { top: 6px; }
  .margin-label-bottom { bottom: 6px; }

  .sticker {
    position: absolute;
    transform-origin: center center;
    user-select: none;
    cursor: move;
  }
  .sticker img { display: block; width: 100%; height: 100%; pointer-events: none; -webkit-user-drag: none; }
  .sticker.selected { outline: 1.5px solid #4a7cfa; outline-offset: 0; }
  .size-label {
    position: absolute;
    left: 50%; top: 100%;
    margin-top: 10px;
    background: #4a7cfa;
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .handle {
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border: 1.5px solid #4a7cfa;
    border-radius: 50%;
    z-index: 10;
  }
  .handle.scale { cursor: nwse-resize; }
  .handle.scale.ne, .handle.scale.sw { cursor: nesw-resize; }
  .handle.rotate { cursor: grab; background: #4a7cfa; border-color: #fff; }
  .handle.rotate::after {
    content: '';
    position: absolute;
    left: 50%; top: 100%;
    width: 1.5px; height: 22px;
    background: #4a7cfa;
    transform: translateX(-50%);
  }

  #sidebar {
    background: var(--bg-sidebar);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    position: relative;
    transition: background 0.15s;
  }
  #sidebar.dragover {
    background: var(--bg-sidebar-dragover);
    outline: 2px dashed #4a7cfa;
    outline-offset: -8px;
  }
  #sidebar h2 { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  #library {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .lib-item {
    position: relative;
    aspect-ratio: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: grab;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lib-item:hover { border-color: #4a7cfa; }
  .lib-item img { max-width: 100%; max-height: 100%; pointer-events: none; }
  .lib-item .del {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.7); color: #fff;
    border: none; border-radius: 50%;
    font-size: 11px; cursor: pointer;
    display: none;
    line-height: 1;
  }
  .lib-item:hover .del { display: block; }

  /* キャリブレーションモーダル */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-toolbar);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    max-width: 560px;
    width: 90%;
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
  .modal .card-area {
    background: var(--bg-elevated);
    padding: 24px;
    border-radius: 6px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center;
    min-height: 240px;
  }
  .calib-card {
    border: 2px solid #4a7cfa;
    border-radius: 8px;
    background: rgba(74,124,250,0.08);
    position: relative;
  }
  .calib-card::after {
    content: 'クレジットカード等 (85.6mm × 54mm)';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #4a7cfa;
    font-size: 11px;
    white-space: nowrap;
  }
  .modal .row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .modal input[type=range] { flex: 1; }
  .modal .ppi-info { font-size: 12px; color: var(--text-secondary); min-width: 130px; text-align: right; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; margin-top: 8px; }
  .modal .reset-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .modal .reset-note { font-size: 11px; color: var(--text-secondary); }
  .modal button.danger { background: var(--bg-danger) !important; }
  .modal button.danger:hover { background: var(--bg-danger-hover) !important; }
  .modal button {
    background: var(--bg-button); color: var(--text-primary); border: none;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .modal button.primary { background: #4a7cfa; }
  .modal button:hover { filter: brightness(1.15); }

  #empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint); font-size: 12px;
    padding: 24px 8px;
    border: 1px dashed var(--border);
    border-radius: 6px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1>すてっかーめーかー</h1>
    <label class="btn icon-btn" title="画像を追加">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>
        <path d="M16 5h6"/>
        <path d="M19 2v6"/>
      </svg>
      <input type="file" id="file-input" accept="image/*" multiple hidden>
    </label>

    <div id="orientation-group">
      <button data-orient="portrait" title="縦向き (127×178mm)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3" width="12" height="18" rx="1.5"/></svg>
      </button>
      <button data-orient="landscape" class="active" title="横向き (178×127mm)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="1.5"/></svg>
      </button>
    </div>

    <button id="undo-btn" class="icon-btn" title="元に戻す (Cmd/Ctrl+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 7v6h6"/>
        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.36 2.64L3 13"/>
      </svg>
    </button>
    <button id="redo-btn" class="icon-btn" title="やり直す (Cmd/Ctrl+Shift+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 7v6h-6"/>
        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64L21 13"/>
      </svg>
    </button>
    <button id="actual-size-btn" class="icon-btn" title="実物大で見る">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="9" width="20" height="6" rx="1"/>
        <line x1="6" y1="9" x2="6" y2="11.5"/>
        <line x1="9" y1="9" x2="9" y2="12.5"/>
        <line x1="12" y1="9" x2="12" y2="11.5"/>
        <line x1="15" y1="9" x2="15" y2="12.5"/>
        <line x1="18" y1="9" x2="18" y2="11.5"/>
      </svg>
    </button>
    <button id="calib-open-btn" class="icon-btn" title="画面サイズを合わせる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
    </button>
    <button id="clear-btn" class="icon-btn" title="全部消す">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    </button>
    <button id="theme-toggle" class="icon-btn" title="テーマ切替">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2"/><path d="M12 20v2"/>
        <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
        <path d="M2 12h2"/><path d="M20 12h2"/>
        <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
    </button>
    <span class="spacer"></span>
    <span class="info" id="save-status"></span>
    <span class="info" id="status">ステッカー: 0</span>
    <button class="primary icon-btn" id="export-btn" title="印刷用に保存">

<script>
// ========= 設定 =========
// 2L: 127×178mm, 300DPI で 1500×2102px
const DPI = 300;
const MM_PER_INCH = 25.4;
const SHORT_MM = 127, LONG_MM = 178;
const SHORT_PX = Math.round(SHORT_MM / MM_PER_INCH * DPI); // 1500
const LONG_PX = Math.round(LONG_MM / MM_PER_INCH * DPI);   // 2102

// セーフマージン（印刷時の縁切れ対策に内側へ確保するマージン領域）
// 外側は2L公称サイズのまま、内側に白い「セーフエリア」を確保し、外周は灰色表示
// 長辺外方向 = 長辺と直交する向き（短辺方向）にインセット
// 短辺外方向 = 短辺と直交する向き（長辺方向）にインセット
const MARGIN_LONG_MM = 5;   // 長辺側のマージン mm
const MARGIN_SHORT_MM = 8;  // 短辺側のマージン mm
const MARGIN_LONG_PX = Math.round(MARGIN_LONG_MM / MM_PER_INCH * DPI);   // ~35
const MARGIN_SHORT_PX = Math.round(MARGIN_SHORT_MM / MM_PER_INCH * DPI); // ~59

let orientation = 'landscape';
let canvasW = SHORT_PX, canvasH = LONG_PX;
// 印刷エリアの canvas 内オフセット
let printX = 0, printY = 0, printW = 0, printH = 0;
// 表示スケール: 高さを画面に合わせる
let displayScale = 0.4;
let actualSizeMode = false;
let calibratedPPI = parseFloat(localStorage.getItem('calibratedPPI') || '0') || 0;

const library = []; // {id, name, src, width, height}
const stickers = []; // {id, libId, x, y, w, h, rot} (画像ピクセル単位 = エクスポート時の座標)
let selectedId = null;
let nextId = 1;

// ========= 自動保存 =========
const STORAGE_KEY = 'sticker-2L-app-state-v1';
let saveTimer = null;
let saveStatusTimer = null;

function autoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveTimer = null;
    try {
      const state = {
        v: 1,
        orientation,
        nextId,
        library: library.map(l => ({ id: l.id, name: l.name, src: l.src, width: l.width, height: l.height })),
        stickers: stickers.map(s => ({ id: s.id, libId: s.libId, x: s.x, y: s.y, w: s.w, h: s.h, rot: s.rot }))
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSaveStatus('自動保存済み');
    } catch (e) {
      console.warn('自動保存失敗:', e);
      flashSaveStatus('保存失敗 (容量超過の可能性)');
    }
  }, 400);
}

function flashSaveStatus(text) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = text;
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.orientation === 'portrait' || state.orientation === 'landscape') {
      orientation = state.orientation;
    }
    if (Array.isArray(state.library)) {
      for (const l of state.library) library.push(l);
    }
    if (Array.isArray(state.stickers)) {
      for (const s of state.stickers) stickers.push(s);
    }
    if (typeof state.nextId === 'number') nextId = Math.max(nextId, state.nextId);
  } catch (e) {
    console.warn('読み込み失敗:', e);
  }
}

// ========= 履歴（Undo/Redo） =========
const undoStack = [];
const redoStack = [];
const HISTORY_LIMIT = 100;

function snapshot() {
  return JSON.stringify({ stickers, selectedId });
}
function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack.length = 0;
  updateUndoButtons();
}
function restore(snap) {
  const data = JSON.parse(snap);
  stickers.length = 0;
  for (const s of data.stickers) stickers.push(s);
  selectedId = data.selectedId;
  if (selectedId != null && !stickers.find(s => s.id === selectedId)) selectedId = null;
  render();
}
function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(snapshot());
  restore(undoStack.pop());
  updateUndoButtons();
}
function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(snapshot());
  restore(redoStack.pop());
  updateUndoButtons();
}
function updateUndoButtons() {
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
  document.getElementById('redo-btn').disabled = redoStack.length === 0;
}

const $canvas = document.getElementById('canvas');
const $wrap = document.getElementById('canvas-wrap');
const $library = document.getElementById('library');
const $status = document.getElementById('status');

function updateCanvasSize() {
  if (orientation === 'portrait') {
    // 縦: 短辺=幅, 長辺=高さ。外側は 2L のまま、内側にマージンをインセット
    canvasW = SHORT_PX;
    canvasH = LONG_PX;
    printX = MARGIN_LONG_PX; printY = MARGIN_SHORT_PX;
    printW = canvasW - 2 * MARGIN_LONG_PX;
    printH = canvasH - 2 * MARGIN_SHORT_PX;
  } else {
    canvasW = LONG_PX;
    canvasH = SHORT_PX;
    printX = MARGIN_SHORT_PX; printY = MARGIN_LONG_PX;
    printW = canvasW - 2 * MARGIN_SHORT_PX;
    printH = canvasH - 2 * MARGIN_LONG_PX;
  }
  if (actualSizeMode && calibratedPPI > 0) {
    // 実寸モード: 1mmが画面上で1mmになるよう displayScale = calibratedPPI / DPI
    displayScale = calibratedPPI / DPI;
  } else {
    // フィット表示
    const maxH = window.innerHeight - 48 - 48;
    const maxW = window.innerWidth - 240 - 48;
    displayScale = Math.min(maxH / canvasH, maxW / canvasW, 1);
  }
  $wrap.style.width = (canvasW * displayScale) + 'px';
  $wrap.style.height = (canvasH * displayScale) + 'px';
  updateStatus();
  render();
}

function updateStatus() {
  const outerMm = orientation === 'portrait' ? `${SHORT_MM}×${LONG_MM}mm` : `${LONG_MM}×${SHORT_MM}mm`;
  const safeW = orientation === 'portrait' ? SHORT_MM - 2*MARGIN_LONG_MM : LONG_MM - 2*MARGIN_SHORT_MM;
  const safeH = orientation === 'portrait' ? LONG_MM - 2*MARGIN_SHORT_MM : SHORT_MM - 2*MARGIN_LONG_MM;
  const mode = actualSizeMode && calibratedPPI > 0 ? '実寸' : `${Math.round(displayScale*100)}%`;
  $status.textContent = `ステッカー: ${stickers.length} | 2L: ${outerMm} (内側 ${safeW}×${safeH}mm) | 表示: ${mode}`;
}

window.addEventListener('resize', updateCanvasSize);

// ========= ファイル取り込み =========
document.getElementById('file-input').addEventListener('change', (e) => {
  for (const f of e.target.files) addFileToLibrary(f);
  e.target.value = '';
});

function addFileToLibrary(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      library.push({ id: nextId++, name: file.name, src: ev.target.result, width: img.width, height: img.height });
      renderLibrary();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// サイドバーへのドロップ（領域全体で受け付け）
const $sidebar = document.getElementById('sidebar');
$sidebar.addEventListener('dragover', (e) => {
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();
  $sidebar.classList.add('dragover');
});
$sidebar.addEventListener('dragleave', (e) => {
  if (e.target === $sidebar || !$sidebar.contains(e.relatedTarget)) {
    $sidebar.classList.remove('dragover');
  }
});
$sidebar.addEventListener('drop', (e) => {
  e.preventDefault();
  $sidebar.classList.remove('dragover');
  for (const f of e.dataTransfer.files) addFileToLibrary(f);
});

function renderLibrary() {
  autoSave();
  $library.innerHTML = '';
  if (library.length === 0) {
    const empty = document.createElement('div');
    empty.id = 'empty';
    empty.innerHTML = '画像をここにドロップ<br>またはツールバーから追加';
    $library.appendChild(empty);
    return;
  }
  for (const item of library) {
    const div = document.createElement('div');
    div.className = 'lib-item';
    div.draggable = true;
    div.dataset.id = item.id;
    div.innerHTML = `<img src="${item.src}"><button class="del" title="削除">×</button>`;
    div.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/sticker-lib-id', String(item.id));
      e.dataTransfer.effectAllowed = 'copy';
    });
    div.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = library.indexOf(item);
      if (idx >= 0) library.splice(idx, 1);
      renderLibrary();
    });
    $library.appendChild(div);
  }
}

// ========= キャンバスへのドロップ =========
$wrap.addEventListener('dragover', (e) => {
  if (e.dataTransfer.types.includes('text/sticker-lib-id') || e.dataTransfer.types.includes('Files')) {
    e.preventDefault();
    $wrap.classList.add('dragover');
  }
});
$wrap.addEventListener('dragleave', (e) => {
  if (e.target === $wrap) $wrap.classList.remove('dragover');
});
$wrap.addEventListener('drop', (e) => {
  e.preventDefault();
  $wrap.classList.remove('dragover');
  const rect = $wrap.getBoundingClientRect();
  const px = (e.clientX - rect.left) / displayScale;
  const py = (e.clientY - rect.top) / displayScale;

  const libId = e.dataTransfer.getData('text/sticker-lib-id');
  if (libId) {
    const item = library.find(l => l.id === Number(libId));
    if (item) addSticker(item, px, py);
    return;
  }
  // 外部ファイルのドロップ → ライブラリに追加+配置
  for (const f of e.dataTransfer.files) {
    addFileAndPlace(f, px, py);
  }
});

function addFileAndPlace(file, x, y) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const item = { id: nextId++, name: file.name, src: ev.target.result, width: img.width, height: img.height };
      library.push(item);
      renderLibrary();
      addSticker(item, x, y);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function addSticker(item, cx, cy) {
  pushUndo();
  // 初期サイズ: キャンバス幅の1/3を上限に元サイズへフィット
  const maxW = canvasW / 3;
  const scale = Math.min(maxW / item.width, 1);
  const w = item.width * scale;
  const h = item.height * scale;
  const s = {
    id: nextId++,
    libId: item.id,
    x: cx - w/2, y: cy - h/2,
    w, h, rot: 0
  };
  stickers.push(s);
  selectedId = s.id;
  render();
}

// ========= レンダリング =========
function render() {
  // 印刷エリア（白）の位置・サイズ
  const $print = document.getElementById('print-area');
  $print.style.left = (printX * displayScale) + 'px';
  $print.style.top = (printY * displayScale) + 'px';
  $print.style.width = (printW * displayScale) + 'px';
  $print.style.height = (printH * displayScale) + 'px';

  // 空キャンバスのガイド表示
  const $empty = document.getElementById('canvas-empty-state');
  if ($empty) $empty.classList.toggle('hidden', stickers.length > 0);

  $canvas.innerHTML = '';
  $canvas.style.position = 'absolute';
  $canvas.style.left = '0'; $canvas.style.top = '0';
  $canvas.style.width = (canvasW * displayScale) + 'px';
  $canvas.style.height = (canvasH * displayScale) + 'px';

  for (const s of stickers) {
    const item = library.find(l => l.id === s.libId);
    if (!item) continue;
    const el = document.createElement('div');
    el.className = 'sticker' + (s.id === selectedId ? ' selected' : '');
    el.dataset.id = s.id;
    const dw = s.w * displayScale, dh = s.h * displayScale;
    const dx = s.x * displayScale, dy = s.y * displayScale;
    el.style.left = dx + 'px';
    el.style.top = dy + 'px';
    el.style.width = dw + 'px';
    el.style.height = dh + 'px';
    el.style.transform = `rotate(${s.rot}deg)`;
    el.innerHTML = `<img src="${item.src}">`;
    if (s.id === selectedId) {
      const wMm = (s.w / DPI * 25.4).toFixed(1);
      const hMm = (s.h / DPI * 25.4).toFixed(1);
      el.innerHTML += `
        <div class="handle scale nw" data-handle="nw" style="left:-6px;top:-6px"></div>
        <div class="handle scale ne" data-handle="ne" style="right:-6px;top:-6px"></div>
        <div class="handle scale sw" data-handle="sw" style="left:-6px;bottom:-6px"></div>
        <div class="handle scale se" data-handle="se" style="right:-6px;bottom:-6px"></div>
        <div class="handle rotate" data-handle="rot" style="left:50%;top:-30px;transform:translateX(-50%)"></div>
        <div class="size-label" style="transform: translateX(-50%) rotate(${-s.rot}deg)">${wMm} × ${hMm} mm</div>
      `;
    }
    $canvas.appendChild(el);
  }
  updateStatus();
  autoSave();
}

// ========= 操作（ドラッグ・スケール・回転） =========
let drag = null;

$canvas.addEventListener('mousedown', (e) => {
  const handleEl = e.target.closest('.handle');
  const stickerEl = e.target.closest('.sticker');
  if (!stickerEl) { selectedId = null; render(); return; }
  const id = Number(stickerEl.dataset.id);
  const s = stickers.find(x => x.id === id);
  if (!s) return;

  if (selectedId !== id) { selectedId = id; render(); }

  const wrapRect = $wrap.getBoundingClientRect();
  const startMouse = {
    x: (e.clientX - wrapRect.left) / displayScale,
    y: (e.clientY - wrapRect.top) / displayScale
  };

  // 操作開始時に履歴へ積む（実際にドラッグで変更が起きた場合のみ確定）
  pushUndo();

  if (handleEl) {
    const type = handleEl.dataset.handle;
    if (type === 'rot') {
      drag = { type: 'rotate', s, startRot: s.rot, cx: s.x + s.w/2, cy: s.y + s.h/2,
               startAngle: Math.atan2(startMouse.y - (s.y + s.h/2), startMouse.x - (s.x + s.w/2)),
               moved: false };
    } else {
      drag = { type: 'scale', s, corner: type,
               startX: s.x, startY: s.y, startW: s.w, startH: s.h,
               aspect: s.w / s.h, startMouse, moved: false };
    }
  } else {
    drag = { type: 'move', s, offsetX: startMouse.x - s.x, offsetY: startMouse.y - s.y, moved: false };
  }
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const wrapRect = $wrap.getBoundingClientRect();
  const mx = (e.clientX - wrapRect.left) / displayScale;
  const my = (e.clientY - wrapRect.top) / displayScale;
  const s = drag.s;
  drag.moved = true;

  if (drag.type === 'move') {
    s.x = mx - drag.offsetX;
    s.y = my - drag.offsetY;
  } else if (drag.type === 'rotate') {
    const angle = Math.atan2(my - drag.cy, mx - drag.cx);
    let deg = drag.startRot + (angle - drag.startAngle) * 180 / Math.PI;
    if (e.shiftKey) deg = Math.round(deg / 15) * 15;
    s.rot = deg;
  } else if (drag.type === 'scale') {
    // 回転を考慮した対角スケール
    const cx = drag.startX + drag.startW / 2;
    const cy = drag.startY + drag.startH / 2;
    const rad = -s.rot * Math.PI / 180;
    // マウス位置を回転前の座標系に変換
    const dx = mx - cx, dy = my - cy;
    const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
    const ly = dx * Math.sin(rad) + dy * Math.cos(rad);
    let signX = drag.corner.includes('e') ? 1 : -1;
    let signY = drag.corner.includes('s') ? 1 : -1;
    let newW = Math.abs(lx) * 2;
    let newH = Math.abs(ly) * 2;
    // アスペクト維持（Shift押下時は自由変形）
    if (!e.shiftKey) {
      const r = Math.max(newW / drag.startW, newH / drag.startH);
      newW = drag.startW * r;
      newH = drag.startH * r;
    }
    newW = Math.max(20, newW);
    newH = Math.max(20, newH);
    s.w = newW; s.h = newH;
    s.x = cx - newW / 2;
    s.y = cy - newH / 2;
  }
  render();
});

window.addEventListener('mouseup', () => {
  if (drag && !drag.moved) {
    // 実際には何も動かさなかった → 履歴を戻す（クリックだけで履歴を汚さない）
    if (undoStack.length > 0) { undoStack.pop(); updateUndoButtons(); }
  }
  drag = null;
});

// ========= キーボード =========
let arrowUndoTimer = null;
let clipboard = null; // {libId, w, h, rot}

function copySelected() {
  if (selectedId == null) return false;
  const s = stickers.find(x => x.id === selectedId);
  if (!s) return false;
  clipboard = { libId: s.libId, w: s.w, h: s.h, rot: s.rot };
  return true;
}
function pasteClipboard() {
  if (!clipboard) return false;
  const item = library.find(l => l.id === clipboard.libId);
  if (!item) return false; // ライブラリから消えていたらペーストできない
  pushUndo();
  // 元のステッカーから少しずらして配置
  let baseX, baseY;
  const orig = stickers.find(x => x.id === selectedId);
  if (orig && orig.libId === clipboard.libId) {
    baseX = orig.x + 30; baseY = orig.y + 30;
  } else {
    baseX = canvasW / 2 - clipboard.w / 2;
    baseY = canvasH / 2 - clipboard.h / 2;
  }
  // 範囲内に収める
  baseX = Math.max(0, Math.min(canvasW - clipboard.w, baseX));
  baseY = Math.max(0, Math.min(canvasH - clipboard.h, baseY));
  const ns = {
    id: nextId++,
    libId: clipboard.libId,
    x: baseX, y: baseY,
    w: clipboard.w, h: clipboard.h, rot: clipboard.rot
  };
  stickers.push(ns);
  selectedId = ns.id;
  render();
  return true;
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  // Undo/Redo
  const meta = e.metaKey || e.ctrlKey;
  if (meta && (e.key === 'z' || e.key === 'Z')) {
    if (e.shiftKey) redo(); else undo();
    e.preventDefault();
    return;
  }
  if (meta && (e.key === 'y' || e.key === 'Y')) {
    redo();
    e.preventDefault();
    return;
  }
  // Copy / Paste / Duplicate
  if (meta && (e.key === 'c' || e.key === 'C')) {
    if (copySelected()) e.preventDefault();
    return;
  }
  if (meta && (e.key === 'v' || e.key === 'V')) {
    if (pasteClipboard()) e.preventDefault();
    return;
  }
  if (meta && (e.key === 'd' || e.key === 'D')) {
    // 選択中のものを直接複製（コピー＋ペースト）
    if (copySelected() && pasteClipboard()) e.preventDefault();
    return;
  }

  if (selectedId == null) return;
  const idx = stickers.findIndex(x => x.id === selectedId);
  if (idx < 0) return;
  const s = stickers[idx];

  if (e.key === 'Delete' || e.key === 'Backspace') {
    pushUndo();
    stickers.splice(idx, 1);
    selectedId = null;
    render();
    e.preventDefault();
  } else if (e.key === ']') {
    if (idx < stickers.length - 1) { pushUndo(); stickers.splice(idx, 1); stickers.push(s); render(); }
  } else if (e.key === '[') {
    if (idx > 0) { pushUndo(); stickers.splice(idx, 1); stickers.unshift(s); render(); }
  } else if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    // 連続押下を1つの履歴にまとめる: 500ms入力なしで確定
    if (!arrowUndoTimer) pushUndo();
    clearTimeout(arrowUndoTimer);
    arrowUndoTimer = setTimeout(() => { arrowUndoTimer = null; }, 500);
    const d = e.shiftKey ? 20 : 2;
    if (e.key === 'ArrowLeft')  s.x -= d;
    if (e.key === 'ArrowRight') s.x += d;
    if (e.key === 'ArrowUp')    s.y -= d;
    if (e.key === 'ArrowDown')  s.y += d;
    render();
    e.preventDefault();
  }
});

// ========= ツールバー =========
function updateOrientButtons() {
  document.querySelectorAll('#orientation-group [data-orient]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.orient === orientation);
  });
}
document.querySelectorAll('#orientation-group [data-orient]').forEach(btn => {
  btn.addEventListener('click', () => {
    orientation = btn.dataset.orient;
    updateCanvasSize();
    updateOrientButtons();
  });
});
document.getElementById('clear-btn').addEventListener('click', () => {
  if (stickers.length === 0) return;
  if (!confirm('配置したステッカーをすべて削除しますか？')) return;
  pushUndo();
  stickers.length = 0;
  selectedId = null;
  render();
});

document.getElementById('undo-btn').addEventListener('click', () => undo());
document.getElementById('redo-btn').addEventListener('click', () => redo());

// ========= 実寸表示 + キャリブレーション =========
const $calibModal = document.getElementById('calib-modal');
const $calibCard = document.getElementById('calib-card');
const $calibSlider = document.getElementById('calib-slider');
const $calibInfo = document.getElementById('calib-info');
const CARD_W_MM = 85.6, CARD_H_MM = 54.0;

function updateCalibPreview() {
  const px = Number($calibSlider.value);
  const ppi = px * 25.4 / CARD_W_MM;
  $calibCard.style.width = px + 'px';
  $calibCard.style.height = (px * CARD_H_MM / CARD_W_MM) + 'px';
  $calibInfo.textContent = `${px}px = 85.6mm  →  ${ppi.toFixed(1)} ppi`;
}
$calibSlider.addEventListener('input', updateCalibPreview);

function openCalibration() {
  // 既存値があれば反映
  if (calibratedPPI > 0) {
    $calibSlider.value = Math.round(calibratedPPI * CARD_W_MM / 25.4);
  }
  updateCalibPreview();
  $calibModal.classList.add('show');
}
function closeCalibration() { $calibModal.classList.remove('show'); }

document.getElementById('calib-cancel').addEventListener('click', closeCalibration);
document.getElementById('calib-save').addEventListener('click', () => {
  const px = Number($calibSlider.value);
  calibratedPPI = px * 25.4 / CARD_W_MM;
  localStorage.setItem('calibratedPPI', String(calibratedPPI));
  closeCalibration();
  actualSizeMode = true;
  document.getElementById('actual-size-btn').classList.add('active');
  updateCanvasSize();
});
document.getElementById('calib-reset').addEventListener('click', () => {
  localStorage.removeItem('calibratedPPI');
  calibratedPPI = 0;
  $calibSlider.value = 323; // 96ppi 相当（一般的な初期値）
  updateCalibPreview();
  if (actualSizeMode) {
    actualSizeMode = false;
    document.getElementById('actual-size-btn').classList.remove('active');
    updateCanvasSize();
  }
});

document.getElementById('actual-size-btn').addEventListener('click', () => {
  if (!actualSizeMode) {
    if (calibratedPPI <= 0) {
      openCalibration();
      return;
    }
    actualSizeMode = true;
    document.getElementById('actual-size-btn').classList.add('active');
  } else {
    actualSizeMode = false;
    document.getElementById('actual-size-btn').classList.remove('active');
  }
  updateCanvasSize();
});

// 実寸ボタンを右クリックでキャリブレーションやり直し
document.getElementById('actual-size-btn').addEventListener('contextmenu', (e) => {
  e.preventDefault();
  openCalibration();
});
// 歯車ボタン: キャリブレーション設定を開く
document.getElementById('calib-open-btn').addEventListener('click', openCalibration);

// ========= エクスポート =========
document.getElementById('export-btn').addEventListener('click', async () => {
  const cv = document.createElement('canvas');
  cv.width = canvasW;
  cv.height = canvasH;
  const ctx = cv.getContext('2d');
  // 出力は全面白（プレビューの灰色マージンは表示専用）
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // 画像を全て事前読み込み
  const imgCache = new Map();
  for (const s of stickers) {
    if (imgCache.has(s.libId)) continue;
    const item = library.find(l => l.id === s.libId);
    if (!item) continue;
    const img = await loadImage(item.src);
    imgCache.set(s.libId, img);
  }

  for (const s of stickers) {
    const img = imgCache.get(s.libId);
    if (!img) continue;
    ctx.save();
    const cx = s.x + s.w / 2;
    const cy = s.y + s.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(s.rot * Math.PI / 180);
    ctx.drawImage(img, -s.w / 2, -s.h / 2, s.w, s.h);
    ctx.restore();
  }

  cv.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `2L-sticker-${ts}.jpg`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/jpeg', 0.95);
});

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// ========= テーマ切替 =========
const THEME_KEY = 'theme';
function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  let theme;
  if (saved === 'light' || saved === 'dark') {
    theme = saved;
  } else {
    theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.dataset.theme = theme;
}
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  localStorage.setItem(THEME_KEY, next);
}
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
// OS設定の変化に追従（ユーザーが localStorage に明示保存していない場合のみ）
matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
  if (localStorage.getItem(THEME_KEY)) return;
  document.documentElement.dataset.theme = e.matches ? 'light' : 'dark';
});

// ========= 起動 =========
initTheme();
loadSaved();
updateOrientButtons();
updateCanvasSize();
renderLibrary();
updateUndoButtons();
</script>
