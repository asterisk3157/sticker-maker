  <!-- タイトル -->
  <text x="600" y="380" text-anchor="middle"
    font-family="Hiragino Sans, Hiragino Kaku Gothic ProN, sans-serif"
    font-size="80" font-weight="700" fill="#1F4F4A" letter-spacing="2">すてっかーめーかー</text>

  <!-- タグライン -->
  <text x="600" y="450" text-anchor="middle"
    font-family="Hiragino Sans, sans-serif"
    font-size="30" fill="#3F7F76">2L判ステッカーを、ブラウザでサクッと。</text>
  <text x="600" y="495" text-anchor="middle"
    font-family="Hiragino Sans, sans-serif"
    font-size="30" fill="#3F7F76">あとはコンビニで印刷するだけ。</text>

  <!-- URL -->
  <text x="1160" y="600" text-anchor="end"
    font-family="ui-monospace, monospace"
    font-size="22" fill="#5D8A82">sticker-maker.shironoir.com</text>
</svg>
